name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: api/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: api

  # backend-test: disabled until auth test hashing is fixed
  # See: tests use crypto.HashArgon2id twice instead of matching client-side flow

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: api/go.sum
      - name: Build
        working-directory: api
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=ci -X main.GitCommit=${{ github.sha }}" \
            -o ../healthvault-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/healthvault

  docker-build:
    name: Docker Build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: healthvault-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Proxy image
        uses: docker/build-push-action@v5
        with:
          context: ./proxy
          push: false
          tags: healthvault-proxy:ci
