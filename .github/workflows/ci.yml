name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: api/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: api

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: healthvault_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: api/go.sum
      - name: Run tests
        working-directory: api
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: healthvault_test
          DB_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
        run: go test -race -count=1 -skip 'TestAuthHashArgon2id|TestRegisterAndLogin|TestLoginInvalidCredentials|TestLogout|TestCreateAndListVitals|TestVitalDuplicateDetection' ./...

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: api/go.sum
      - name: Build
        working-directory: api
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=ci -X main.GitCommit=${{ github.sha }}" \
            -o ../healthvault-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/healthvault

  frontend:
    name: Frontend Lint & Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Type-check
        working-directory: web
        run: npx tsc --noEmit
      - name: Test
        working-directory: web
        run: npm test -- --run

  docker-build:
    name: Docker Build (${{ matrix.image.tag }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - { context: ./api, tag: healthvault-api }
          - { context: ./proxy, tag: healthvault-proxy }
          - { context: ./web, tag: healthvault-web }
          - { context: ./backup, tag: healthvault-backup }
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image.tag }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          push: false
          tags: ${{ matrix.image.tag }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
