name: Mobile Release — APK & AAB

on:
  push:
    tags:
      - 'mobile-v*'

permissions:
  contents: write
  id-token: write
  actions: read

env:
  FLUTTER_VERSION: stable
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Pre-flight: extract version, run analyze + tests (gate)
  # ─────────────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Extract version from pubspec.yaml
        run: |
          FULL=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION=$(echo "$FULL" | cut -d'+' -f1)
          BUILD=$(echo "$FULL" | cut -d'+' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION+$BUILD"

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos || true
      - run: flutter test

  # ─────────────────────────────────────────────────────────────────────────
  # Android APK + AAB (signed release builds)
  # ─────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android (APK + AAB)
    needs: preflight
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get

      # Signing — expects base64-encoded keystore in secrets.
      # If KEYSTORE_BASE64 is unset, build falls back to debug signing.
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Create key.properties
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          {
            echo "storePassword=${STORE_PASSWORD}"
            echo "keyPassword=${KEY_PASSWORD}"
            echo "keyAlias=${KEY_ALIAS}"
            echo "storeFile=keystore.jks"
          } > android/key.properties

      - name: Build APK
        run: flutter build apk --release --obfuscate --split-debug-info=build/symbols

      - name: Build AAB
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/symbols

      - name: Rename artifacts
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             "HealthVault-${VERSION}.apk"
          cp build/app/outputs/bundle/release/app-release.aab \
             "HealthVault-${VERSION}.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile/HealthVault-*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: mobile/HealthVault-*.aab

      - uses: actions/upload-artifact@v4
        with:
          name: android-symbols
          path: mobile/build/symbols
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────
  # GitHub Release
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [preflight, build-android]
    if: ${{ !cancelled() && needs.preflight.result == 'success' && needs.build-android.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      BUILD_NUMBER: ${{ needs.preflight.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp artifacts/android-apk/HealthVault-*.apk release-assets/ 2>/dev/null || true
          cp artifacts/android-aab/HealthVault-*.aab release-assets/ 2>/dev/null || true
          ls -lh release-assets/

      - name: Generate release notes
        run: |
          {
            echo "## HealthVault Mobile ${VERSION}"
            echo ""
            echo "### Downloads"
            echo ""
            echo "| Platform | File |"
            echo "|----------|------|"
            echo "| Android (signed APK) | \`HealthVault-${VERSION}.apk\` |"
            echo "| Android (AAB for Play Store) | \`HealthVault-${VERSION}.aab\` |"
            echo ""
            echo "### Install"
            echo ""
            echo "**Android sideload:** Download and install the APK."
            echo ""
            echo "**Play Store:** Upload the AAB via Play Console."
            echo ""
            echo "---"
            echo "**License:** AGPL-3.0 | **Project:** [healthapp](https://github.com/MalteKiefer/healthapp)"
          } > release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: HealthVault Mobile ${{ needs.preflight.outputs.version }}
          draft: false
          body_path: release-notes.md
          files: release-assets/*
