version: 2
updates:
  # Flutter / Dart
  - package-ecosystem: pub
    directory: /mobile
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dart-minor-and-patch:
        update-types:
          - minor
          - patch
    rebase-strategy: auto
    labels:
      - dependencies
      - mobile

  # Backend Go modules
  - package-ecosystem: gomod
    directory: /api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch
    rebase-strategy: auto
    labels:
      - dependencies
      - backend

  # Web frontend npm
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
      npm-dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    rebase-strategy: auto
    labels:
      - dependencies
      - web

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    rebase-strategy: auto
    labels:
      - dependencies
      - ci
