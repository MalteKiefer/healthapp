# HealthVault — Hardened PostgreSQL 16 Configuration

# Connection
listen_addresses = '*'
port = 5432
max_connections = 30  # pool_size (20) + reserve_pool_size (5) + 5 admin

# Authentication
password_encryption = scram-sha-256

# SSL — disabled inside Docker (Caddy handles TLS externally)
# Enable if you need encrypted connections between containers
ssl = off
# ssl_cert_file = '/var/lib/postgresql/server.crt'
# ssl_key_file = '/var/lib/postgresql/server.key'

# Logging
log_destination = 'stderr'
logging_collector = off
log_connections = on
log_disconnections = on
log_statement = 'ddl'
log_duration = off
log_min_duration_statement = 1000
log_line_prefix = '%m [%p] %q%u@%d '
log_timezone = 'UTC'

# Locale
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# Memory
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB
effective_cache_size = 256MB

# WAL
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# Checkpoints
checkpoint_completion_target = 0.9

# Planner
random_page_cost = 1.1
effective_io_concurrency = 200
