; HealthVault — PgBouncer Configuration
; Transaction pooling between API and PostgreSQL

[databases]
healthvault = host=db port=5432 dbname=healthvault

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; ── Sizing Presets ──────────────────────────────────────────────────
; Choose one preset and set values in the Active section below.
;
; PRESET: Small (1–5 users, Raspberry Pi / low-power ARM, 1–2 GB RAM)
; pool_size = 5
; max_client_conn = 20
; server_idle_timeout = 600
; reserve_pool_size = 2
;
; PRESET: Medium (5–20 users, small VPS or home server, 2–8 GB RAM)
; pool_size = 20
; max_client_conn = 100
; server_idle_timeout = 300
; reserve_pool_size = 5
;
; PRESET: Large (20–100 users, dedicated server, 8+ GB RAM)
; pool_size = 50
; max_client_conn = 300
; server_idle_timeout = 120
; reserve_pool_size = 10
;
; NOTE: PostgreSQL max_connections must be >= pool_size + reserve_pool_size + 5

; Active preset (Medium)
pool_mode = transaction
default_pool_size = 20
max_client_conn = 100
server_idle_timeout = 300
reserve_pool_size = 5
reserve_pool_timeout = 3

; Timeouts
server_connect_timeout = 15
server_login_retry = 5
query_timeout = 30
query_wait_timeout = 120
client_idle_timeout = 600

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

; Admin
admin_users = healthvault
