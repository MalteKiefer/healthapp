# HealthVault — Hardened Redis 7 Configuration

# Network
bind 0.0.0.0
port 6379
protected-mode yes
tcp-backlog 511
timeout 300
tcp-keepalive 300

# Security — password set via environment variable at startup
# requirepass is set via command line argument in docker-compose

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Disable dangerous commands
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
rename-command CONFIG "HEALTHVAULT_CONFIG"
rename-command SHUTDOWN "HEALTHVAULT_SHUTDOWN"

# Logging
loglevel notice

# Connections
maxclients 128

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
