run:
  timeout: 5m
  go: '1.26'

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - dupl
    - goconst
    - gocyclo
    - gosec
    - misspell
    - nakedret
    - prealloc
    - revive
    - unconvert
    - unparam
  disable:
    - depguard

linters-settings:
  gocyclo:
    min-complexity: 40
  dupl:
    threshold: 150
  goconst:
    min-len: 5
    min-occurrences: 5
  revive:
    rules:
      - name: exported
        disabled: true
  errcheck:
    exclude-functions:
      - (net/http.ResponseWriter).Write
      - (*encoding/json.Encoder).Encode
      - (*go.uber.org/zap.Logger).Sync
      - io.Copy
      - (io.Closer).Close

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - gosec
        - goconst
    - path: migrations/
      linters:
        - all
    - text: "Error return value of `tx.Rollback`"
      linters:
        - errcheck
    - text: "Error return value of `.*\\.db\\.Exec`"
      linters:
        - errcheck
    - text: "G115: integer overflow conversion"
      linters:
        - gosec
    - text: "make it a constant"
      linters:
        - goconst
  max-issues-per-linter: 50
  max-same-issues: 10
