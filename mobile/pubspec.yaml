name: healthapp
description: "HealthVault - Self-hosted health data platform"
publish_to: 'none'
version: 0.0.20+20

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  dynamic_color: ^1.7.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP & Networking
  dio: ^5.8.0+1
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8

  # Navigation
  go_router: ^15.1.2

  # Charts
  fl_chart: ^1.0.0

  # Crypto
  pointycastle: ^4.0.0

  # Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Security / Crypto
  local_auth: ^2.3.0
  cryptography: ^2.7.0
  connectivity_plus: ^6.0.0

  # URL Launcher
  url_launcher: ^6.3.1

  # Sharing
  share_plus: ^12.0.2
  path_provider: ^2.1.5

  # App info
  package_info_plus: ^8.0.0

  # File Picker
  file_picker: ^8.3.7

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  freezed: ^3.0.6
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
