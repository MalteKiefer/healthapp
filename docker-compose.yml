services:
  web:
    build: ./web
    ports:
      - "127.0.0.1:3100:80"
    networks:
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    build: ./api
    ports:
      - "127.0.0.1:3101:8080"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_PRIVATE_KEY_PATH=/data/keys/jwt_private.pem
      - JWT_PUBLIC_KEY_PATH=/data/keys/jwt_public.pem
      - TOTP_KEY_PATH=/data/keys/totp.key
      - INSTANCE_HOSTNAME=${INSTANCE_HOSTNAME}
      - REGISTRATION_MODE=${REGISTRATION_MODE:-invite_only}
      - DEFAULT_QUOTA_MB=${DEFAULT_QUOTA_MB:-5120}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
    volumes:
      - uploads:/data/uploads
      - jwt-keys:/data/keys
    networks:
      - internal
      - frontend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      - DATABASE_URL=postgres://${DB_USER:-healthvault}:${DB_PASSWORD}@db:5432/${DB_NAME:-healthvault}
      - POOL_MODE=transaction
      - DEFAULT_POOL_SIZE=20
      - MAX_CLIENT_CONN=100
      - RESERVE_POOL_SIZE=5
      - LISTEN_PORT=6432
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_SUPERUSER:-postgres}
      - POSTGRES_PASSWORD=${DB_SUPERUSER_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - HEALTHVAULT_DB_USER=${DB_USER:-healthvault}
      - HEALTHVAULT_DB_PASSWORD=${DB_PASSWORD}
      - HEALTHVAULT_DB_READONLY_USER=healthvault_readonly
      - HEALTHVAULT_DB_READONLY_PASSWORD=${DB_READONLY_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro,z
      - ./deploy/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro,z
      - ./deploy/postgres/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro,z
    command: >
      postgres
        -c config_file=/etc/postgresql/postgresql.conf
        -c hba_file=/etc/postgresql/pg_hba.conf
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SUPERUSER:-postgres} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: >
      redis-server /usr/local/etc/redis/redis.conf
        --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
      - ./deploy/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro,z
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  backup:
    build: ./backup
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - PGPASSWORD=${DB_PASSWORD}
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      - BACKUP_INTERVAL=${BACKUP_INTERVAL:-86400}
    volumes:
      - backup-data:/backups
      - uploads:/data/uploads:ro
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  backup-verify:
    build:
      context: ./backup
      dockerfile: Dockerfile.verify
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY}
      - VERIFY_INTERVAL=${VERIFY_INTERVAL:-604800}
    volumes:
      - backup-data:/backups:ro
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      backup:
        condition: service_started
    restart: unless-stopped

networks:
  internal:
    internal: true
  frontend:

volumes:
  postgres-data:
  redis-data:
  backup-data:
  uploads:
  jwt-keys:
